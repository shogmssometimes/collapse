<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cHUD — Compact HUD for Derived Stats</title>
    <style>
      /* touch-blocker styles */
      .touch-blocker{position:absolute;inset:0;z-index:2;background:transparent;border-radius:inherit;display:block;pointer-events:auto;touch-action:manipulation}
      .has-touch-blocker{position:relative}
      ::selection{background:transparent !important;color:inherit !important}
    </style>
    <!-- Not processed by Vite — already present in public/chud/ -->
    <script src="./meter-bridge.js"></script>
    <script src="./touch-blocker.js" defer></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/chud/chud-main.tsx"></script>
  </body>
</html>
